name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────── Go relay + agent + protocol ─────────────────
  backend:
    name: Backend (Go relay/agent + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Format check
        run: |
          unformatted="$(gofmt -l proto relay agent test)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on these files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests (race)
        run: go test -race ./...

      - name: Tools for end-to-end tunnel test
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends openssh-server tmux

      - name: End-to-end reverse tunnel (real SSH + tmux)
        run: bash scripts/e2e.sh

  # ───────────────────────────── AWS infra-as-code ───────────────────────────
  infra:
    name: Infra (Terraform + Lambda + Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'

      - name: Terraform init (no backend)
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform fmt check
        run: terraform -chdir=infra/terraform fmt -check

      - name: Lambda builds (linux/arm64 custom runtime)
        run: GOOS=linux GOARCH=arm64 go build -o /tmp/bootstrap ./infra/lambda

      - name: Relay container image builds
        run: docker build -f relay/Dockerfile -t remux-relay .

  # ───────────────────────────── Android app ─────────────────────────────────
  android:
    name: Android (:core tests + assembleDebug + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/libs.versions.toml', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Core unit tests (pure JVM, no emulator)
        run: ./gradlew :core:test

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Lint
        run: ./gradlew lintDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
